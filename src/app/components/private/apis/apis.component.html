<div class="md:ml-1 min-h-screen p-6">
  <div class="mb-6">
    <h1 class="text-3xl font-bold text-white mb-2">API Overview</h1>
    <p class="text-muted">Manage and monitor your APIs</p>
  </div>

  <div class="grid sm:grid-cols-10 grid-cols-1 gap-4 mb-6">
    <input type="text"
           placeholder="Search APIs..."
           class="sm:col-span-8 lg:col-span-9 px-5 py-3 rounded-lg glass text-white placeholder-muted outline-0 focus:ring-2 focus:ring-primary"
           oninput="filterAPIs(this.value)"/>
    <button class="sm:col-span-2 lg:col-span-1 w-full bg-primary rounded-lg text-white text-md font-bold text-center hover-glow outline-0 flex justify-center items-center py-3 hover:bg-hover transition-colors"
           (click)="showDialog()">
      <i class="pi pi-plus-circle pr-2"></i>
      Add API
    </button>
  </div>

  <div class="flex gap-2 mb-6 overflow-x-auto">
    <button class="px-4 py-2 rounded-lg glass text-white hover:bg-primary transition-colors whitespace-nowrap" onclick="filterByStatus('all')">
      All APIs
    </button>
    <button class="px-4 py-2 rounded-lg glass text-white hover:bg-primary transition-colors whitespace-nowrap" onclick="filterByStatus('online')">
      Online
    </button>
    <button class="px-4 py-2 rounded-lg glass text-white hover:bg-primary transition-colors whitespace-nowrap" onclick="filterByStatus('offline')">
      Offline
    </button>
    <button class="px-4 py-2 rounded-lg glass text-white hover:bg-primary transition-colors whitespace-nowrap" onclick="filterByStatus('maintenance')">
      Maintenance
    </button>
  </div>

  <!-- API Grid -->
  <div class="grid grid-cols-1 lg:grid-cols-2 2xl:grid-cols-3 gap-6" id="apiGrid">
    <!-- API Card 1 -->
    <div *ngFor="let api of apis" [routerLink]="'/app/api-details/'+api.apiKey" class="glass rounded-lg api-card cursor-pointer" data-status="online" data-name="user authentication api">
      <div class="p-6">
        <div class="flex items-start justify-between mb-4">
          <div class="flex items-center gap-3">
            <div class="bg-surface rounded-full w-12 h-12 flex items-center justify-center">
              <i class="pi pi-shield text-xl text-primary"></i>
            </div>
            <div>
              <h3 class="text-lg font-bold text-white">{{api.name}}</h3>
              <p class="text-sm text-muted">{{api.description}}</p>
            </div>
          </div>
          <span class="status-online px-3 py-1 rounded-full text-xs font-bold text-white">Online</span>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-4">
          <div class="metric-badge rounded-lg px-3 py-2">
            <p class="text-xs text-muted">Requests Today</p>
            <p class="text-lg font-bold text-primary">1,247</p>
          </div>
          <div class="metric-badge rounded-lg px-3 py-2">
            <p class="text-xs text-muted">Avg Response</p>
            <p class="text-lg font-bold text-primary">142ms</p>
          </div>
        </div>

        <div class="flex items-center justify-between">
          <div class="flex items-center gap-2">
            <i class="pi pi-calendar text-xs text-muted"></i>
            <span class="text-xs text-muted">Last updated: 2 hours ago</span>
          </div>
          <div class="flex gap-2">
            <button class="text-primary hover:text-hover">
              <i class="pi pi-cog"></i>
            </button>
            <button class="text-primary hover:text-hover">
              <i class="pi pi-chart-line"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="apis.length===0" id="noResults" class="text-center py-12">
    <i class="pi pi-search text-6xl text-muted mb-4"></i>
    <h3 class="text-xl text-white mb-2">No APIs Found</h3>
    <p class="text-muted">Try adjusting your search criteria or add a new API</p>
  </div>

  <p-dialog header="Edit Profile" [modal]="true" [(visible)]="visible" [style]="{ width: '25rem' }">
    <span class="p-text-secondary block mb-5">Update your information.</span>
    <div class="flex align-items-center gap-3 mb-3">
      <label for="username" class="font-semibold w-6rem">Username</label>
      <input pInputText id="username" class="flex-auto" autocomplete="off" />
    </div>
    <div class="flex align-items-center gap-3 mb-5">
      <label for="email" class="font-semibold w-6rem">Email</label>
      <input pInputText id="email" class="flex-auto" autocomplete="off" />
    </div>
    <div class="flex justify-content-end gap-2">
      <button class="bg-muted rounded-lg text-white px-5 py-3" (click)="visible = false">Cancel</button>
      <button class="bg-primary rounded-lg text-white px-5 py-3">Create</button>
    </div>
  </p-dialog>
</div>
