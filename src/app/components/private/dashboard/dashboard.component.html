<div class="md:ml-1 min-h-screen">
  <div class="grid grid-cols-1 lg:grid-cols-2 2xl:grid-cols-4 grid-flow gap-4">
    <div class="glass px-7 py-12 rounded-lg grid grid-cols-4 grid-flow box-shadow">
      <div class="bg-surface rounded-full w-16 h-16 mx-auto flex items-center -mr-4 justify-center">
        <i class="pi pi-server text-2xl text-primary"></i>
      </div>
      <div></div>
      <div class="col-span-2">
        <p class="text-md text-white">APIs</p>
        <p class="text-2xl font-bold text-primary">2</p>
      </div>

    </div>
    <div class="glass px-7 py-12 rounded-lg grid grid-cols-4 grid-flow box-shadow">
      <div class="bg-surface rounded-full w-16 h-16 mx-auto flex items-center -mr-4 justify-center">
        <i class="pi pi-sitemap text-2xl text-primary"></i>
      </div>
      <div></div>
      <div class="col-span-2">
        <p class="text-md text-white">Requests/month</p>
        <p class="text-2xl font-bold text-primary">500</p>
      </div>
    </div>
    <div class="glass px-7 py-12 rounded-lg grid grid-cols-4 grid-flow box-shadow">
      <div class="bg-surface rounded-full w-16 h-16 mx-auto flex items-center -mr-4 justify-center">
        <i class="pi pi-clock text-2xl text-primary"></i>
      </div>
      <div></div>
      <div class="col-span-2">
        <p class="text-md text-white">Last Request</p>
        <p class="text-2xl font-bold text-primary">5 min ago</p>
      </div>
    </div>
    <div class="glass px-7 py-12 rounded-lg grid grid-cols-4 grid-flow box-shadow">
      <div class="bg-surface rounded-full w-16 h-16 mx-auto flex items-center -mr-4 justify-center">
        <i class="pi pi-code text-2xl text-primary"></i>
      </div>
      <div></div>
      <div class="col-span-2">
        <p class="text-md text-white">Endpoints</p>
        <p class="text-2xl font-bold text-primary">32</p>
      </div>
    </div>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-4">
    <div class="glass px-7 py-12 rounded-lg">
      <h3 class="text-lg text-white col-span-3">Requests</h3>
      <p-chart class="w-full" type="line" [data]="data" [options]="options" />
    </div>
    <div class="glass px-7 py-12 rounded-lg">
      <h3 class="text-lg text-white mb-4">Top APIs</h3>
      <p-chart class="w-full" type="bar" [data]="topApisData" [options]="topApisOptions" />
    </div>

  </div>

</div>
